name: Deploy Release to Private Server

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # Pass the tag name as an environment variable to the server
          envs: GITHUB_REF_NAME
          script: |
            # --- Configuration ---
            APP_DIR="/home/khskekec/apps/diakem-control-center/"
            REPO="DiaKEM/control-center"

            # Just the prefix of your file (e.g., "flutter-app" for "flutter-app-v2.0.tar.gz")
            ASSET_PREFIX="diakem-control-center" 
            TOKEN="${{ secrets.MY_GITHUB_TOKEN }}"

            echo "⏳ Waiting for the release to be published"
            sleep 10
            echo "🔍 Searching for latest asset starting with: $ASSET_PREFIX"

            # 1. Get the browser_download_url using a 'startswith' filter
            # This looks at all assets and picks the first one that matches the prefix
            DOWNLOAD_URL=$(curl -s -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/$REPO/releases/latest" \
              | jq -r ".assets[] | select(.name | startswith(\"$ASSET_PREFIX\")) | .browser_download_url" | head -n 1)

            if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
              echo "❌ Error: No asset found starting with '$ASSET_PREFIX'"
              exit 1
            fi

            echo "📦 Found matching Asset URL: $DOWNLOAD_URL"

            # 2. Download the file 
            # -L follows redirects, -o specifies the output path
            curl -L -H "Authorization: token $TOKEN" \
              "$DOWNLOAD_URL" \
              -o /tmp/deploy_package.zip

            # 3. Clean and Extract
            echo "🚀 Deploying to $APP_DIR..."
            # Ensure the directory exists
            mkdir -p $APP_DIR

            # Using a temp folder for extraction to prevent partial file issues
            mkdir -p /tmp/extract_temp
            unzip /tmp/deploy_package.zip -d /tmp/extract_temp

            # Atomic-ish swap: Clear target and move new files in
            rm -rf ${APP_DIR}/*
            cp -R /tmp/extract_temp/* ${APP_DIR}/
            cd ${APP_DIR}/backend
            
            # Configuration
            MAX_RETRIES=5
            COUNT=0
            COMMAND="npm install --platform=linux --arch=x64 sharp@0.32.6"
            # Force Node to clean garbage collection at 1GB to stay under 1.5GB limit
            export NODE_OPTIONS="--max-old-space-size=1024"
            
            until $COMMAND || [ $COUNT -eq $MAX_RETRIES ]; do
              COUNT=$((COUNT + 1))
              echo "⚠️  Install failed (likely OOM Killed). Attempt $COUNT of $MAX_RETRIES..."
              
              # Clean cache and remove half-finished folders to start fresh
              npm cache clean --force
              rm -rf node_modules/sharp
              
              # Optional: small sleep to let the server "breathe"
              sleep 2
            done
            
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Failed to install Sharp after $MAX_RETRIES attempts."
              exit 1
            else
              echo "✅ Sharp installed successfully!"
            fi
            
            
            #npm rebuild bcrypt --build-from-source
            #npm install sharp@0.32.6

            # 4. Restart the Service
            echo "🔄 Restarting service..."
            ~/bin/pm2 restart  kemal-diakem-control-center

            # 5. Cleanup
            rm /tmp/deploy_package.zip
            rm -rf /tmp/extract_temp

            echo "✅ Deployment successful!"