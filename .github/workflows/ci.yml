name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  # ── Prettier ────────────────────────────────────────────────────────────────
  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Check formatting
        run: npx prettier --check "../backend/src/**/*.ts" "../backend/test/**/*.ts" "../frontend/src/**/*.{ts,tsx}"
        working-directory: backend

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend / ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run ESLint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"
        working-directory: backend

  backend-test:
    name: Backend / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests with coverage
        run: npm run test:cov -- --coverageReporters=text --coverageReporters=json-summary
        working-directory: backend
      - name: Extract coverage percentage
        id: cov
        if: github.ref == 'refs/heads/main'
        run: |
          PCT=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "pct=$PCT" >> $GITHUB_OUTPUT
          if node -e "process.exit(parseFloat('$PCT') >= 80 ? 0 : 1)"; then COLOR=brightgreen
          elif node -e "process.exit(parseFloat('$PCT') >= 60 ? 0 : 1)"; then COLOR=yellow
          else COLOR=red; fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
        working-directory: backend
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_BACKEND_COVERAGE_ID }}
          filename: diakem-backend-coverage.json
          label: Backend Coverage
          message: ${{ steps.cov.outputs.pct }}%
          color: ${{ steps.cov.outputs.color }}

  backend-build:
    name: Backend / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Build
        run: npm run build
        working-directory: backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend / ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

  frontend-test:
    name: Frontend / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=json-summary
        working-directory: frontend
      - name: Extract coverage percentage
        id: cov
        if: github.ref == 'refs/heads/main'
        run: |
          PCT=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "pct=$PCT" >> $GITHUB_OUTPUT
          if node -e "process.exit(parseFloat('$PCT') >= 80 ? 0 : 1)"; then COLOR=brightgreen
          elif node -e "process.exit(parseFloat('$PCT') >= 60 ? 0 : 1)"; then COLOR=yellow
          else COLOR=red; fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
        working-directory: frontend
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_FRONTEND_COVERAGE_ID }}
          filename: diakem-frontend-coverage.json
          label: Frontend Coverage
          message: ${{ steps.cov.outputs.pct }}%
          color: ${{ steps.cov.outputs.color }}

  frontend-build:
    name: Frontend / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
